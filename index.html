<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor IGN - Herramientas Completas</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <style>
        :root {
            --ign-blue: #003366;
            --ign-gold: #e6b800;
            --danger: #dc3545;
            --shadow: 0 4px 12px rgba(0,0,0,0.15);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        #map-container {
            position: relative;
            height: 100vh;
            width: 100%;
        }

        #map { height: 100%; width: 100%; background: #f0f0f0; }

        .left-controls {
            position: absolute;
            top: 320px; 
            left: 12px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: white; border: 1px solid #ccc;
            border-radius: 4px; box-shadow: var(--shadow);
            cursor: pointer; width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: all 0.2s;
        }
        .control-btn:hover { background: #f8fafc; }
        .control-btn.active { background: var(--ign-blue); color: white; border-color: var(--ign-blue); }

        #cancel-crop-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            display: none;
        }

        .sidebar {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            width: 320px; max-width: calc(100vw - 20px);
            background: white; border-radius: 12px;
            box-shadow: var(--shadow); display: flex; flex-direction: column;
            max-height: calc(100vh - 30px); transition: transform 0.3s ease;
        }
        .sidebar.oculto { transform: translateX(125%); }
        
        .header {
            background: var(--ign-blue); color: white;
            padding: 15px; border-radius: 12px 12px 0 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .content { padding: 15px; overflow-y: auto; }

        .section-title {
            font-size: 11px; font-weight: 800; color: #64748b;
            margin-bottom: 10px; text-transform: uppercase;
            border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; margin-top: 15px;
        }

        .gallery-container { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .gallery-item {
            background: #f8fafc; border-radius: 8px; overflow: hidden;
            border: 1px solid #e2e8f0; padding: 10px;
        }
        .gallery-thumb {
            width: 100%; height: auto; max-height: 150px; object-fit: contain; 
            background: #fff; border: 1px solid #ddd; margin-bottom: 8px;
        }
        .gallery-actions { display: flex; gap: 5px; }
        .gallery-actions button {
            flex: 1; padding: 6px; font-size: 11px; cursor: pointer; border-radius: 4px; border: 1px solid #cbd5e0;
        }

        .btn-outline { 
            background: white; color: var(--ign-blue); border: 1.5px solid var(--ign-blue); 
            width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 8px;
        }
        .form-input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e0; margin-bottom: 10px; box-sizing: border-box;}

        .coord-display {
            position: absolute; bottom: 10px; left: 10px;
            z-index: 999; background: rgba(255,255,255,0.9);
            padding: 8px 12px; border-radius: 6px; font-size: 12px; font-family: 'Courier New', monospace;
            border: 1px solid #ccc; font-weight: bold;
        }

        .fab-menu {
            position: absolute; bottom: 25px; right: 20px;
            z-index: 1000; background: var(--ign-blue); color: white;
            border: none; border-radius: 50px; padding: 14px 24px; font-weight: 600; cursor: pointer;
        }

        /* Estilo etiquetas cuadrícula */
        .grid-label {
            background: rgba(255,255,255,0.7);
            padding: 1px 3px;
            border-radius: 3px;
            font-size: 10px;
            color: var(--ign-blue);
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <button id="cancel-crop-btn" onclick="stopPolygonalCrop()">✕ Cancelar Recorte (Esc)</button>

    <div class="left-controls">
        <button class="control-btn" title="Orientar al Norte" onclick="resetNorth()">
            <svg id="compass-needle" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="#f8fafc" stroke="#cbd5e0" stroke-width="2" />
                <path d="M50 10 L65 50 L50 45 L35 50 Z" fill="#dc3545" />
                <path d="M50 90 L65 50 L50 55 L35 50 Z" fill="#003366" />
            </svg>
        </button>
        <button id="scissors-btn" class="control-btn" title="Recorte Poligonal" onclick="togglePolygonalCrop()">✂️</button>
    </div>

    <div class="coord-display" id="liveCoords">Lat: -- | Lon: --</div>

    <button class="fab-menu" id="fabBtn" onclick="toggleMenu()">🛠️ Herramientas</button>

    <div class="sidebar oculto" id="panelLateral">
        <div class="header">
            <span style="font-weight: bold;">Herramientas</span>
            <button style="background:none; border:none; color:white; cursor:pointer;" onclick="toggleMenu()">✕</button>
        </div>
        <div class="content">
            <div class="section-title">⚙️ Configuración Mapa</div>
            <label style="font-size: 12px; margin-bottom: 5px; display: block;">Capa de Fondo:</label>
            <select id="baseLayer" class="form-input" onchange="changeLayer(this.value)">
                <option value="mtn">Mapa Topográfico (MTN)</option>
                <option value="pnoa">Satélite (PNOA)</option>
                <option value="base">Callejero IGN</option>
            </select>
            
            <label style="font-size: 12px; margin-bottom: 5px; display: block;">Visualización:</label>
            <button class="btn-outline" onclick="toggleGrid()">🌐 Mostrar/Ocultar Cuadrícula</button>
            
            <div class="section-title">💾 Datos y Exportación</div>
            <button class="btn-outline" onclick="exportarGeoJSON()">Exportar Dibujos (GeoJSON)</button>

            <div class="section-title">🖼️ Mis Recortes (Capturas)</div>
            <div id="gallery" class="gallery-container">
                <p style="font-size: 12px; color: #64748b; text-align: center; padding: 20px;">Utiliza las tijeras para crear un recorte del mapa.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        let snapshots = [];
        let isCropping = false;
        let currentDrawHandler = null;
        let gridLayer = null;
        let isGridVisible = false;

        const layers = {
            mtn: L.tileLayer('https://www.ign.es/wmts/mapa-raster?layer=MTN&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/jpeg&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN', crossOrigin: 'anonymous' }),
            pnoa: L.tileLayer('https://www.ign.es/wmts/pnoa-ma?layer=OI.OrthoimageCoverage&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/jpeg&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN-PNOA', crossOrigin: 'anonymous' }),
            base: L.tileLayer('https://www.ign.es/wmts/ign-base?layer=IGNBaseTodo&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN', crossOrigin: 'anonymous' })
        };

        const map = L.map('map', {
            center: [40.4167, -3.7037],
            zoom: 6,
            layers: [layers.mtn],
            zoomControl: true 
        });

        const drawnItems = new L.FeatureGroup().addTo(map);
        const drawControl = new L.Control.Draw({
            position: 'topleft',
            edit: { featureGroup: drawnItems, remove: true },
            draw: { polyline: true, polygon: true, rectangle: true, circle: true, marker: true, circlemarker: false }
        });
        map.addControl(drawControl);

        // --- LÓGICA DE CUADRÍCULA CORREGIDA ---
        function updateGrid() {
            if (!isGridVisible) return;
            if (gridLayer) map.removeLayer(gridLayer);
            
            gridLayer = L.layerGroup();
            const bounds = map.getBounds();
            const zoom = map.getZoom();
            
            // Determinar intervalo según zoom
            let step = 1;
            if (zoom > 8) step = 0.1;
            if (zoom > 11) step = 0.01;
            if (zoom < 6) step = 5;

            const startLat = Math.floor(bounds.getSouth() / step) * step;
            const endLat = Math.ceil(bounds.getNorth() / step) * step;
            const startLng = Math.floor(bounds.getWest() / step) * step;
            const endLng = Math.ceil(bounds.getEast() / step) * step;

            // Dibujar Paralelos (Líneas Horizontales)
            for (let lat = startLat; lat <= endLat; lat += step) {
                L.polyline([[lat, startLng - step], [lat, endLng + step]], {
                    color: '#003366', weight: 0.8, opacity: 0.4, interactive: false
                }).addTo(gridLayer);
                
                // Etiqueta latitud
                L.marker([lat, bounds.getWest()], {
                    icon: L.divIcon({ className: 'grid-label', html: lat.toFixed(step < 1 ? 2 : 0) + '°' }),
                    interactive: false
                }).addTo(gridLayer);
            }

            // Dibujar Meridianos (Líneas Verticales) - CORREGIDO
            for (let lng = startLng; lng <= endLng; lng += step) {
                L.polyline([[startLat - step, lng], [endLat + step, lng]], {
                    color: '#003366', weight: 0.8, opacity: 0.4, interactive: false
                }).addTo(gridLayer);
                
                // Etiqueta longitud
                L.marker([bounds.getNorth(), lng], {
                    icon: L.divIcon({ className: 'grid-label', html: lng.toFixed(step < 1 ? 2 : 0) + '°' }),
                    interactive: false
                }).addTo(gridLayer);
            }

            gridLayer.addTo(map);
        }

        function toggleGrid() {
            isGridVisible = !isGridVisible;
            if (isGridVisible) {
                updateGrid();
                map.on('moveend zoomend', updateGrid);
            } else {
                if (gridLayer) map.removeLayer(gridLayer);
                map.off('moveend zoomend', updateGrid);
            }
        }

        // --- RESTO DE FUNCIONALIDADES ---
        map.on(L.Draw.Event.CREATED, (e) => {
            if (isCropping) processCrop(e.layer);
            else drawnItems.addLayer(e.layer);
        });

        function togglePolygonalCrop() { isCropping ? stopPolygonalCrop() : startPolygonalCrop(); }

        function startPolygonalCrop() {
            isCropping = true;
            document.getElementById('scissors-btn').classList.add('active');
            document.getElementById('cancel-crop-btn').style.display = 'block';
            currentDrawHandler = new L.Draw.Polygon(map, {
                shapeOptions: { color: '#e6b800', fillOpacity: 0.3, dashArray: '5, 10' }
            });
            currentDrawHandler.enable();
        }

        function stopPolygonalCrop() {
            isCropping = false;
            if (currentDrawHandler) { currentDrawHandler.disable(); currentDrawHandler = null; }
            document.getElementById('scissors-btn').classList.remove('active');
            document.getElementById('cancel-crop-btn').style.display = 'none';
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && isCropping) stopPolygonalCrop(); });

        async function processCrop(polygonLayer) {
            const tempLayer = polygonLayer;
            stopPolygonalCrop();
            const mapContainer = document.getElementById('map-container');
            
            try {
                const fullCanvas = await html2canvas(mapContainer, {
                    useCORS: true,
                    ignoreElements: (el) => {
                        return el.id === 'fabBtn' || el.classList.contains('sidebar') || 
                               el.classList.contains('left-controls') || el.id === 'cancel-crop-btn' ||
                               el.classList.contains('leaflet-control-container');
                    }
                });

                const points = tempLayer.getLatLngs()[0].map(latlng => map.latLngToContainerPoint(latlng));
                const cropCanvas = document.createElement('canvas');
                const ctx = cropCanvas.getContext('2d');
                
                const minX = Math.min(...points.map(p => p.x));
                const maxX = Math.max(...points.map(p => p.x));
                const minY = Math.min(...points.map(p => p.y));
                const maxY = Math.max(...points.map(p => p.y));
                
                cropCanvas.width = maxX - minX;
                cropCanvas.height = maxY - minY;

                ctx.beginPath();
                ctx.moveTo(points[0].x - minX, points[0].y - minY);
                points.forEach(p => ctx.lineTo(p.x - minX, p.y - minY));
                ctx.closePath();
                ctx.clip();

                ctx.drawImage(fullCanvas, minX, minY, cropCanvas.width, cropCanvas.height, 0, 0, cropCanvas.width, cropCanvas.height);

                snapshots.push({
                    id: Date.now(),
                    name: `Recorte ${snapshots.length + 1}`,
                    dataUrl: cropCanvas.toDataURL('image/png')
                });
                
                updateGallery();
                if (document.getElementById('panelLateral').classList.contains('oculto')) toggleMenu();
            } catch (err) { console.error(err); }
        }

        function updateGallery() {
            const container = document.getElementById('gallery');
            if (snapshots.length === 0) {
                container.innerHTML = '<p style="font-size: 12px; color: #64748b; text-align: center; padding: 20px;">Utiliza las tijeras para crear un recorte del mapa.</p>';
                return;
            }
            container.innerHTML = snapshots.map(snap => `
                <div class="gallery-item">
                    <img src="${snap.dataUrl}" class="gallery-thumb">
                    <input type="text" value="${snap.name}" class="form-input" style="font-size: 11px;" onchange="renameSnap(${snap.id}, this.value)">
                    <div class="gallery-actions">
                        <button onclick="downloadSnap('${snap.dataUrl}', '${snap.name}')">Bajar</button>
                        <button onclick="deleteSnap(${snap.id})" style="color:red">Borrar</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteSnap(id) { snapshots = snapshots.filter(s => s.id !== id); updateGallery(); }
        function downloadSnap(url, name) {
            const a = document.createElement('a'); a.href = url; a.download = `${name}.png`; a.click();
        }
        function toggleMenu() { document.getElementById('panelLateral').classList.toggle('oculto'); }
        function resetNorth() { map.setView(map.getCenter(), map.getZoom(), {animate: true}); }
        function changeLayer(v) { 
            Object.values(layers).forEach(l => map.removeLayer(l)); 
            layers[v].addTo(map); 
        }

        map.on('mousemove', (e) => {
            const p = e.latlng;
            document.getElementById('liveCoords').innerText = `Lat: ${p.lat.toFixed(5)} | Lon: ${p.lng.toFixed(5)}`;
        });

        function exportarGeoJSON() {
            const data = drawnItems.toGeoJSON();
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "dibujos_ign.geojson";
            a.click();
        }
    </script>
</body>
</html>
