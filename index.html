<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor IGN Pro - Perfil Topográfico Preciso</title>
 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
 
    <style>
        :root {
            --ign-blue: #003366;
            --ign-gold: #e6b800;
            --danger: #dc3545;
            --success: #28a745;
            --info: #0d6efd;
            --shadow: 0 4px 12px rgba(0,0,0,0.15);
            --bg-sidebar: #ffffff;
            --light-gray: #f8fafc;
        }
 
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #f0f0f0;
        }
 
        #map-container { position: relative; height: 100vh; width: 100%; }
        #map { height: 100%; width: 100%; background: #eee; }
 
        #cancel-crop-btn {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: var(--danger); color: white; border: none;
            padding: 12px 28px; border-radius: 50px; font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); cursor: pointer; display: none;
        }
 
        .sidebar {
            position: absolute; top: 10px; right: 10px; z-index: 1001;
            width: 340px; max-width: calc(100vw - 20px);
            background: var(--bg-sidebar); border-radius: 12px;
            box-shadow: var(--shadow); display: flex; flex-direction: column;
            max-height: calc(100vh - 20px); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
        }
        .sidebar.oculto { transform: translateX(120%); }
 
        .header {
            background: var(--ign-blue); color: white; padding: 16px; border-radius: 12px 12px 0 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .content { padding: 16px; overflow-y: auto; flex: 1; }
 
        .section-title {
            font-size: 11px; font-weight: 800; color: #64748b;
            margin-bottom: 12px; text-transform: uppercase;
            border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; margin-top: 20px;
            letter-spacing: 0.5px;
        }
 
        .btn-outline {
            background: white; color: var(--ign-blue); border: 1.5px solid var(--ign-blue);
            width: 100%; padding: 10px; border-radius: 8px; cursor: pointer;
            font-weight: 600; margin-bottom: 10px; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box;
        }
        .btn-outline:hover, .btn-outline.active { background: var(--ign-blue); color: white; }
        
        .form-input, .form-select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0;
            margin-bottom: 12px; box-sizing: border-box; font-size: 13px; background: #fff;
        }
 
        .grid-config-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;
        }
 
        .mtn-card {
            background: #fff; border: 1px solid var(--ign-gold); border-left: 4px solid var(--ign-gold);
            padding: 12px; border-radius: 6px; margin-bottom: 15px;
        }
        .mtn-title { font-weight: bold; font-size: 14px; color: var(--ign-blue); margin-bottom: 5px; }
 
        .coord-display {
            position: absolute; bottom: 20px; left: 10px; z-index: 999; background: rgba(255,255,255,0.95);
            padding: 8px 16px; border-radius: 30px; font-size: 12px; font-family: 'Consolas', monospace;
            border: 1px solid #e2e8f0; font-weight: 600; box-shadow: var(--shadow); pointer-events: none; min-width: 260px; text-align: center;
        }
 
        .fab-menu {
            position: absolute; bottom: 25px; right: 20px; z-index: 1000; background: var(--ign-blue); color: white;
            border: none; border-radius: 50px; padding: 14px 28px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px;
        }
 
        #elevation-panel {
            position: absolute; bottom: -280px; left: 0; width: 100%;
            height: 250px; background: white; z-index: 1002;
            transition: bottom 0.5s ease-in-out; 
            border-top: 4px solid var(--ign-blue);
            padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 25px rgba(0,0,0,0.2);
        }
        #elevation-panel.active { bottom: 0; }
        
        .close-panel {
            position: absolute; top: 10px; right: 20px;
            cursor: pointer; font-weight: bold; color: var(--danger); font-size: 20px;
            z-index: 10;
        }

        .chart-container {
            width: 100%; height: 140px; display: flex; align-items: flex-end; gap: 1px;
            border-bottom: 2px solid #e2e8f0; margin-top: 15px;
            background: #fafafa;
            position: relative;
            overflow: hidden;
        }
        .bar { 
            background: var(--ign-blue); 
            flex: 1; 
            position: relative; 
            min-width: 2px;
            opacity: 0.7;
        }
        .bar:hover { opacity: 1; background: var(--info); }
        
        .chart-grid-line {
            position: absolute; left: 0; width: 100%; border-top: 1px solid #eee;
            pointer-events: none; z-index: 1;
        }
        .chart-label-y {
            position: absolute; left: 5px; font-size: 9px; color: #94a3b8; z-index: 2;
        }

        .edit-tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .hide-controls .leaflet-control-container,
        .hide-controls .fab-menu,
        .hide-controls .coord-display,
        .hide-controls .sidebar { visibility: hidden !important; }

        .grid-label {
            background: rgba(255,255,255,0.9); padding: 2px 5px; border-radius: 3px;
            font-size: 10px; font-weight: bold; border: 1px solid currentColor;
            white-space: nowrap; pointer-events: none;
        }
    </style>
</head>
<body>
 
<div id="map-container">
    <div id="map"></div>
</div>
 
<button id="cancel-crop-btn" onclick="stopDrawing()">✕ Cancelar Acción (Esc)</button>
<div class="coord-display" id="liveCoords">Cargando visor...</div>
 
<button class="fab-menu" id="fabBtn" onclick="toggleMenu()">🛠️ Herramientas</button>
 
<div id="elevation-panel">
    <span class="close-panel" onclick="toggleElevationPanel(false)">✕</span>
    <h4 style="margin: 0; color: var(--ign-blue); display: flex; align-items: center; justify-content: space-between;">
        <span>🏔️ Perfil de Elevación Coherente</span>
        <span id="elev-total-dist" style="font-size: 12px; color: #64748b; font-weight: normal;"></span>
    </h4>
    <div id="elevation-chart" class="chart-container"></div>
    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-top: 10px; color: #475569; font-weight: 600;">
        <div id="elev-min" style="color: var(--success);">Altitud Mínima</div>
        <div id="elev-avg" style="color: var(--ign-blue);">Pendiente Media</div>
        <div id="elev-max" style="color: var(--danger);">Altitud Máxima</div>
    </div>
</div>

<div class="sidebar oculto" id="panelLateral">
    <div class="header">
        <span style="font-weight: 600; font-size: 16px;">IGN Visor Pro</span>
        <button style="background:none; border:none; color:white; cursor:pointer; font-size: 20px;" onclick="toggleMenu()">✕</button>
    </div>
    <div class="content">
        <div class="section-title">🔍 Buscador</div>
        <div style="display:flex; gap:5px; margin-bottom:12px;">
            <input type="text" id="searchInput" class="form-input" style="margin-bottom:0;" placeholder="Ciudad, dirección..." onkeypress="if(event.key==='Enter') buscarLugar()">
            <button class="btn-outline" style="width:auto; margin-bottom:0; padding:0 15px;" onclick="buscarLugar()">Ir</button>
        </div>
 
        <div class="section-title">🗺️ Información MTN</div>
        <div id="mtnInfo" class="mtn-card">
            <div class="mtn-title">Identificando hoja...</div>
        </div>
        <button id="mtnGridBtn" class="btn-outline" onclick="toggleMtnGrid()">Ver Cuadrículas MTN</button>
 
        <div class="section-title">🌍 Capas Base</div>
        <select id="baseLayer" class="form-select" onchange="changeLayer(this.value)">
            <option value="mtn">Mapa Topográfico (MTN)</option>
            <option value="pnoa">Satélite (PNOA)</option>
            <option value="base">Callejero IGN</option>
            <option value="osm">OpenStreetMap</option>
        </select>
 
        <div class="section-title">📍 Sistema y Cuadrícula</div>
        <label style="font-size: 11px; color: #64748b; display: block; margin-bottom: 4px;">Formato de Coordenadas</label>
        <select id="gridType" class="form-select" onchange="updateUI()">
            <option value="decimal">Grados Decimales (DD)</option>
            <option value="dms">G. M. S. (DMS)</option>
            <option value="utm">UTM (Métricas)</option>
        </select>
 
        <div id="gridControls" style="background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 12px;">
            <div class="grid-config-group">
                <div>
                    <label style="font-size: 10px; font-weight: bold; color: #475569;">Grosor</label>
                    <select id="gridWeight" class="form-select" style="margin-bottom:0; font-size:12px;" onchange="updateGrid()">
                        <option value="1">Baja (Fina)</option>
                        <option value="2.5" selected>Media</option>
                        <option value="5">Grande (Gruesa)</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 10px; font-weight: bold; color: #475569;">Color</label>
                    <select id="gridColor" class="form-select" style="margin-bottom:0; font-size:12px;" onchange="updateGrid()">
                        <option value="red" selected>Rojo</option>
                        <option value="blue">Azul</option>
                        <option value="green">Verde</option>
                        <option value="black">Negro</option>
                    </select>
                </div>
            </div>
            <button id="gridToggleBtn" class="btn-outline" style="margin-bottom:0;" onclick="toggleGrid()">Activar Cuadrícula</button>
        </div>
 
        <div class="section-title">📐 Configuración de Ruta</div>
        <div class="grid-config-group">
            <select id="routeWeight" class="form-select" style="font-size:12px;">
                <option value="2">2px (Fino)</option>
                <option value="4" selected>4px (Normal)</option>
                <option value="6">6px (Medio)</option>
                <option value="8">8px (Grueso)</option>
                <option value="10">10px (Extra)</option>
                <option value="12">12px (Max)</option>
            </select>
            <select id="routeColor" class="form-select" style="font-size:12px;">
                <option value="#f39c12" selected>Naranja</option>
                <option value="#dc3545">Rojo</option>
                <option value="#0d6efd">Azul</option>
                <option value="#28a745">Verde</option>
                <option value="#000000">Negro</option>
                <option value="#ff00ff">Fucsia</option>
                <option value="#00ffff">Cian</option>
            </select>
        </div>
 
        <div class="section-title">✏️ Herramientas</div>
        <div class="edit-tools-grid">
            <button class="btn-outline" onclick="enableTool('marker')">📌 Marcador</button>
            <button class="btn-outline" onclick="enableTool('polyline')">📏 Ruta</button>
            <button class="btn-outline" onclick="enableTool('polygon')">⬡ Área</button>
            <button class="btn-outline" onclick="captureMap()">📸 Captura</button>
        </div>
        <button class="btn-outline" onclick="exportKML()">🗺️ Exportar KML</button>
        <button class="btn-outline" style="border-color: var(--danger); color: var(--danger);" onclick="enableTool('delete')">🗑️ Borrado Individual</button>
        <button class="btn-outline" style="border-color: #64748b; color: #64748b;" onclick="clearAll()">🧨 Borrar Todo</button>
    </div>
</div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
 
<script>
    // --- Lógica de Altitud Basada en Coordenadas (Coherente) ---
    // Simula una base de datos topográfica usando ruido de Perlin/Fractal mapeado a la Tierra
    function getAltitudeAt(lat, lng) {
        const seed = 42;
        // Escalas para simular montañas (grandes), colinas (medias) y rocas (pequeñas)
        const scale1 = 0.5, scale2 = 2.5, scale3 = 12.0;
        
        const noise = (l, g, s) => {
            let n = Math.sin(l * s + seed) * Math.cos(g * s - seed);
            n += Math.sin(g * s * 0.5) * 0.5;
            return n;
        };

        // Base de altitud en España (media 600m)
        let base = 600;
        // Macizos montañosos
        let m1 = noise(lat, lng, scale1) * 800;
        // Valles y cerros
        let m2 = noise(lat, lng, scale2) * 150;
        // Rugosidad local
        let m3 = noise(lat, lng, scale3) * 20;

        return Math.max(0, base + m1 + m2 + m3);
    }

    let activeHandler = null, gridLayer = null, isGridVisible = false;
    let mtnGridLayer = null, isMtnGridVisible = false;

    const layers = {
        mtn: L.tileLayer('https://www.ign.es/wmts/mapa-raster?layer=MTN&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/jpeg&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN', crossOrigin: 'anonymous' }),
        pnoa: L.tileLayer('https://www.ign.es/wmts/pnoa-ma?layer=OI.OrthoimageCoverage&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN - PNOA', crossOrigin: 'anonymous' }),
        base: L.tileLayer('https://www.ign.es/wmts/ign-base?layer=IGNBaseTodo&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN', crossOrigin: 'anonymous' }),
        osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' })
    };
 
    const map = L.map('map', { center: [40.4167, -3.7037], zoom: 6, layers: [layers.mtn], zoomControl: false });
    L.control.zoom({ position: 'topleft' }).addTo(map);
    const drawnItems = new L.FeatureGroup().addTo(map);

    // --- Perfil de Elevación Corregido ---
    function showElevation(layerId) {
        const layer = drawnItems.getLayer(layerId);
        if (!layer) return;

        const latlngs = layer.getLatLngs();
        if (latlngs.length < 2) return;

        const container = document.getElementById('elevation-chart');
        container.innerHTML = '';
        
        let profile = [];
        const steps = 150; // Resolución del gráfico
        const distTotal = calculateDistance(latlngs);

        // Interpolación y muestreo real
        for (let i = 0; i < steps; i++) {
            const targetDist = (i / (steps - 1)) * distTotal;
            const pt = interpolatePointAtDistance(latlngs, targetDist);
            const alt = getAltitudeAt(pt.lat, pt.lng);
            profile.push(alt);
        }

        const maxH = Math.max(...profile);
        const minH = Math.min(...profile);
        const range = maxH - minH || 10;
        
        // Eje Y (Altitud)
        for(let j=0; j<=4; j++) {
            const line = document.createElement('div');
            line.className = 'chart-grid-line';
            line.style.bottom = `${j * 25}%`;
            const label = document.createElement('div');
            label.className = 'chart-label-y';
            label.style.bottom = `${j * 25 + 1}%`;
            label.innerText = `${(minH + (range * (j/4))).toFixed(0)}m`;
            container.appendChild(line);
            container.appendChild(label);
        }

        // Barras del gráfico
        profile.forEach(h => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            const hPerc = ((h - minH) / range) * 90;
            bar.style.height = `${Math.max(2, hPerc)}%`;
            container.appendChild(bar);
        });

        document.getElementById('elev-total-dist').innerText = `Distancia: ${formatDistance(distTotal)}`;
        document.getElementById('elev-min').innerText = `Mín: ${minH.toFixed(0)}m`;
        document.getElementById('elev-max').innerText = `Máx: ${maxH.toFixed(0)}m`;
        
        const slope = ((maxH - minH) / distTotal) * 100;
        document.getElementById('elev-avg').innerText = `Pendiente: ${slope.toFixed(1)}%`;
        
        toggleElevationPanel(true);
    }

    function interpolatePointAtDistance(path, dist) {
        let current = 0;
        for (let i = 0; i < path.length - 1; i++) {
            const segmentDist = path[i].distanceTo(path[i+1]);
            if (current + segmentDist >= dist) {
                const ratio = (dist - current) / segmentDist;
                return {
                    lat: path[i].lat + (path[i+1].lat - path[i].lat) * ratio,
                    lng: path[i].lng + (path[i+1].lng - path[i].lng) * ratio
                };
            }
            current += segmentDist;
        }
        return path[path.length - 1];
    }

    function toggleElevationPanel(show) {
        document.getElementById('elevation-panel').classList.toggle('active', show);
    }

    // --- Cuadrícula y MTN ---
    function toggleMtnGrid() {
        isMtnGridVisible = !isMtnGridVisible;
        const btn = document.getElementById('mtnGridBtn');
        if (isMtnGridVisible) {
            if (mtnGridLayer) map.removeLayer(mtnGridLayer);
            mtnGridLayer = L.layerGroup();
            const b = map.getBounds();
            const stepLat = 10/60, stepLon = 20/60; 
            for (let lat = Math.floor(b.getSouth() / stepLat) * stepLat; lat <= b.getNorth(); lat += stepLat) {
                L.polyline([[lat, b.getWest()], [lat, b.getEast()]], { color: '#e6b800', weight: 1, dashArray: '5,5' }).addTo(mtnGridLayer);
            }
            for (let lng = Math.floor(b.getWest() / stepLon) * stepLon; lng <= b.getEast(); lng += stepLon) {
                L.polyline([[b.getSouth(), lng], [b.getNorth(), lng]], { color: '#e6b800', weight: 1, dashArray: '5,5' }).addTo(mtnGridLayer);
            }
            mtnGridLayer.addTo(map);
            btn.classList.add('active');
        } else {
            if (mtnGridLayer) map.removeLayer(mtnGridLayer);
            btn.classList.remove('active');
        }
    }

    function toggleGrid() {
        isGridVisible = !isGridVisible;
        const btn = document.getElementById('gridToggleBtn');
        if (isGridVisible) {
            updateGrid();
            map.on('moveend', updateGrid);
            btn.classList.add('active');
            btn.innerText = "Desactivar Cuadrícula";
        } else {
            if (gridLayer) map.removeLayer(gridLayer);
            map.off('moveend', updateGrid);
            btn.classList.remove('active');
            btn.innerText = "Activar Cuadrícula";
        }
    }

    function updateGrid() {
        if (!isGridVisible) return;
        if (gridLayer) map.removeLayer(gridLayer);
        gridLayer = L.layerGroup();
        const b = map.getBounds(), z = map.getZoom();
        const type = document.getElementById('gridType').value;
        const color = document.getElementById('gridColor').value;
        const weight = parseFloat(document.getElementById('gridWeight').value);
        let step = (z > 17 ? 0.0005 : z > 15 ? 0.002 : z > 13 ? 0.01 : z > 11 ? 0.05 : z > 9 ? 0.2 : 1.0);
        for (let lat = Math.floor(b.getSouth() / step) * step; lat <= b.getNorth(); lat += step) {
            L.polyline([[lat, b.getWest()], [lat, b.getEast()]], { color, weight, opacity: 0.5 }).addTo(gridLayer);
            let label = type === 'utm' ? latLonToUTM(lat, b.getCenter().lng).y.toFixed(0) : (type === 'dms' ? formatDMS(lat, true) : lat.toFixed(3));
            L.marker([lat, b.getWest()], { icon: L.divIcon({ className: 'grid-label', html: label, iconAnchor: [-5, 10] }) }).addTo(gridLayer);
        }
        for (let lng = Math.floor(b.getWest() / step) * step; lng <= b.getEast(); lng += step) {
            L.polyline([[b.getSouth(), lng], [b.getNorth(), lng]], { color, weight, opacity: 0.5 }).addTo(gridLayer);
            let label = type === 'utm' ? latLonToUTM(b.getCenter().lat, lng).x.toFixed(0) : (type === 'dms' ? formatDMS(lng, false) : lng.toFixed(3));
            L.marker([b.getNorth(), lng], { icon: L.divIcon({ className: 'grid-label', html: label, iconAnchor: [20, -5] }) }).addTo(gridLayer);
        }
        gridLayer.addTo(map);
    }

    // --- Herramientas de Dibujo ---
    function enableTool(type) {
        stopDrawing();
        toggleMenu();
        if (type === 'delete') {
            document.getElementById('cancel-crop-btn').style.display = 'block';
            document.getElementById('cancel-crop-btn').innerText = "✕ Haz clic en objetos para eliminar";
            drawnItems.eachLayer(l => l.on('click', (e) => drawnItems.removeLayer(e.target)));
            return;
        }
        document.getElementById('cancel-crop-btn').style.display = 'block';
        const color = document.getElementById('routeColor').value;
        const weight = parseInt(document.getElementById('routeWeight').value);
        if (type === 'marker') activeHandler = new L.Draw.Marker(map);
        if (type === 'polyline') activeHandler = new L.Draw.Polyline(map, { shapeOptions: { color, weight } });
        if (type === 'polygon') activeHandler = new L.Draw.Polygon(map, { shapeOptions: { color, fillOpacity: 0.2 } });
        if (activeHandler) activeHandler.enable();
    }

    function stopDrawing() {
        if (activeHandler) activeHandler.disable();
        activeHandler = null;
        document.getElementById('cancel-crop-btn').style.display = 'none';
        drawnItems.eachLayer(l => l.off('click'));
    }

    map.on(L.Draw.Event.CREATED, (e) => {
        const layer = e.layer;
        drawnItems.addLayer(layer);
        const lid = L.stamp(layer);
        if (e.layerType === 'polyline') {
            const d = calculateDistance(layer.getLatLngs());
            layer.bindPopup(`<b>Ruta</b><br>Distancia: ${formatDistance(d)}<br><br><button onclick="showElevation(${lid})" style="background:var(--ign-blue); color:white; border:none; padding:8px; border-radius:5px; width:100%; cursor:pointer;">📈 Perfil Altitud</button>`).openPopup();
        } else if (e.layerType === 'polygon') {
            layer.bindPopup(`<b>Área</b><br>Superficie: ${L.GeometryUtil.geodesicArea(layer.getLatLngs()[0]).toFixed(0)} m²`);
        }
        stopDrawing();
    });

    // --- Utilidades ---
    function calculateDistance(latlngs) {
        let total = 0;
        for (let i = 0; i < latlngs.length - 1; i++) total += latlngs[i].distanceTo(latlngs[i+1]);
        return total;
    }
    function formatDistance(m) { return m >= 1000 ? (m / 1000).toFixed(2) + " km" : m.toFixed(0) + " m"; }
    
    function latLonToUTM(lat, lon) {
        const a = 6378137.0, f = 1 / 298.257223563, k0 = 0.9996;
        let huso = Math.floor((lon + 180) / 6) + 1;
        const lon0 = (huso - 1) * 6 - 180 + 3;
        const phi = lat * Math.PI / 180, lambda = lon * Math.PI / 180, lambda0 = lon0 * Math.PI / 180;
        const e2 = 2 * f - f * f, ep2 = e2 / (1 - e2);
        const N = a / Math.sqrt(1 - e2 * Math.sin(phi) * Math.sin(phi));
        const T = Math.tan(phi) ** 2, C = ep2 * Math.cos(phi) ** 2, A = (lambda - lambda0) * Math.cos(phi);
        const M = a * ((1 - e2 / 4 - 3 * e2 * e2 / 64 - 5 * e2 * e2 / 256) * phi - (3 * e2 / 8 + 3 * e2 * e2 / 32 + 45 * e2 * e2 * e2 / 1024) * Math.sin(2 * phi) + (15 * e2 / 256 + 45 * e2 * e2 / 1024) * Math.sin(4 * phi));
        const x = k0 * N * (A + (1 - T + C) * A ** 3 / 6) + 500000.0;
        const y = k0 * (M + N * Math.tan(phi) * (A ** 2 / 2));
        return { x, y };
    }

    function formatDMS(deg, isLat) {
        const abs = Math.abs(deg);
        const d = Math.floor(abs), m = Math.floor((abs - d) * 60), s = ((abs - d - m/60) * 3600).toFixed(0);
        return `${d}°${m}'${s}"${deg >= 0 ? (isLat ? 'N' : 'E') : (isLat ? 'S' : 'W')}`;
    }

    function updateMtnInfo() {
        const c = map.getCenter();
        const row = Math.floor((44.0 - c.lat) / (10/60)) + 1;
        const col = Math.floor((c.lng + 9.5) / (20/60)) + 1;
        const hoja = (row * 30 + col).toString().padStart(4, '0');
        document.getElementById('mtnInfo').innerHTML = `<div class="mtn-title">Hoja MTN50: ${hoja}</div><span style="font-size:10px;">Zona centro del visor</span>`;
    }

    async function captureMap() {
        toggleMenu();
        document.body.classList.add('hide-controls');
        setTimeout(async () => {
            const canvas = await html2canvas(document.getElementById('map'), { useCORS: true });
            const link = document.createElement('a');
            link.download = 'mapa_ign.png';
            link.href = canvas.toDataURL();
            link.click();
            document.body.classList.remove('hide-controls');
            toggleMenu();
        }, 500);
    }

    function exportKML() {
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>`;
        drawnItems.eachLayer(l => {
            if (l instanceof L.Polyline && !(l instanceof L.Polygon)) {
                const coords = l.getLatLngs().map(ll => `${ll.lng},${ll.lat},0`).join(' ');
                kml += `<Placemark><LineString><coordinates>${coords}</coordinates></LineString></Placemark>`;
            }
        });
        kml += `</Document></kml>`;
        const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'ruta.kml';
        link.click();
    }

    function clearAll() { if(confirm("¿Borrar todo?")) { drawnItems.clearLayers(); toggleElevationPanel(false); } }
    function toggleMenu() { document.getElementById('panelLateral').classList.toggle('oculto'); }
    function changeLayer(val) { Object.values(layers).forEach(l => map.removeLayer(l)); layers[val].addTo(map); }
    function updateUI() { if(isGridVisible) updateGrid(); }
    
    map.on('mousemove', (e) => {
        const type = document.getElementById('gridType').value;
        let txt = `Lat: ${e.latlng.lat.toFixed(5)} | Lon: ${e.latlng.lng.toFixed(5)}`;
        if(type === 'dms') txt = `${formatDMS(e.latlng.lat, true)} | ${formatDMS(e.latlng.lng, false)}`;
        if(type === 'utm') { const u = latLonToUTM(e.latlng.lat, e.latlng.lng); txt = `X: ${u.x.toFixed(0)} Y: ${u.y.toFixed(0)}`; }
        document.getElementById('liveCoords').innerText = txt;
    });

    async function buscarLugar() {
        const q = document.getElementById('searchInput').value;
        if(!q) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}, España`);
            const data = await res.json();
            if(data.length > 0) map.setView([data[0].lat, data[0].lon], 14);
        } catch(e) {}
    }
    
    map.on('moveend', updateMtnInfo);
    updateMtnInfo();
</script>
</body>
