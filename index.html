<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor IGN Pro - Edición y Personalización</title>
 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
 
    <style>
        :root {
            --ign-blue: #003366;
            --ign-gold: #e6b800;
            --danger: #dc3545;
            --success: #28a745;
            --info: #0d6efd;
            --shadow: 0 4px 12px rgba(0,0,0,0.15);
            --bg-sidebar: #ffffff;
            --light-gray: #f8fafc;
        }
 
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #f0f0f0;
        }
 
        #map-container { position: relative; height: 100vh; width: 100%; }
        #map { height: 100%; width: 100%; background: #eee; }
 
        #cancel-crop-btn {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: var(--danger); color: white; border: none;
            padding: 12px 28px; border-radius: 50px; font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); cursor: pointer; display: none;
        }
 
        .sidebar {
            position: absolute; top: 10px; right: 10px; z-index: 1001;
            width: 340px; max-width: calc(100vw - 20px);
            background: var(--bg-sidebar); border-radius: 12px;
            box-shadow: var(--shadow); display: flex; flex-direction: column;
            max-height: calc(100vh - 20px); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
        }
        .sidebar.oculto { transform: translateX(120%); }
 
        .header {
            background: var(--ign-blue); color: white; padding: 16px; border-radius: 12px 12px 0 0;
            display: flex; align-items: center; justify-content: space-between;
        }
        .content { padding: 16px; overflow-y: auto; flex: 1; }
 
        .section-title {
            font-size: 11px; font-weight: 800; color: #64748b;
            margin-bottom: 12px; text-transform: uppercase;
            border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; margin-top: 20px;
            letter-spacing: 0.5px;
        }
 
        .btn-outline {
            background: white; color: var(--ign-blue); border: 1.5px solid var(--ign-blue);
            width: 100%; padding: 10px; border-radius: 8px; cursor: pointer;
            font-weight: 600; margin-bottom: 10px; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box;
        }
        .btn-outline:hover, .btn-outline.active { background: var(--ign-blue); color: white; }
        
        .form-input, .form-select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0;
            margin-bottom: 12px; box-sizing: border-box; font-size: 13px; background: #fff;
        }
 
        .grid-config-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;
        }
 
        .mtn-card {
            background: #fff; border: 1px solid var(--ign-gold); border-left: 4px solid var(--ign-gold);
            padding: 12px; border-radius: 6px; margin-bottom: 15px;
        }
        .mtn-title { font-weight: bold; font-size: 14px; color: var(--ign-blue); margin-bottom: 5px; }
 
        .coord-display {
            position: absolute; bottom: 20px; left: 10px; z-index: 999; background: rgba(255,255,255,0.95);
            padding: 8px 16px; border-radius: 30px; font-size: 12px; font-family: 'Consolas', monospace;
            border: 1px solid #e2e8f0; font-weight: 600; box-shadow: var(--shadow); pointer-events: none; min-width: 260px; text-align: center;
        }
 
        .fab-menu {
            position: absolute; bottom: 25px; right: 20px; z-index: 1000; background: var(--ign-blue); color: white;
            border: none; border-radius: 50px; padding: 14px 28px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px;
        }
 
        .grid-label {
            background: rgba(255,255,255,0.9); padding: 2px 5px; border-radius: 3px;
            font-size: 10px; font-weight: bold; border: 1px solid currentColor;
            white-space: nowrap; pointer-events: none;
        }
 
        .gallery-item { margin-bottom: 10px; border: 1px solid #ddd; padding: 5px; background: #fff; border-radius: 4px; }
        .gallery-item img { width: 100%; display: block; border-radius: 4px; }
 
        .hide-controls .leaflet-control-container,
        .hide-controls .fab-menu,
        .hide-controls .coord-display,
        .hide-controls .sidebar { visibility: hidden !important; }
 
        .edit-tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
 
        /* Panel de Elevación */
        #elevation-panel {
            position: absolute; bottom: -250px; left: 0; width: 100%;
            height: 220px; background: white; z-index: 1002;
            transition: bottom 0.5s ease; border-top: 4px solid var(--ign-blue);
            padding: 15px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
        }
        #elevation-panel.active { bottom: 0; }
        
        .close-panel {
            position: absolute; top: 10px; right: 20px;
            cursor: pointer; font-weight: bold; color: var(--danger); font-size: 18px;
        }

        .chart-container {
            width: 100%; height: 120px; display: flex; align-items: flex-end; gap: 2px;
            border-bottom: 2px solid #ccc; padding-bottom: 5px; margin-top: 10px;
        }
        .bar { background: var(--info); flex: 1; transition: height 0.3s; position: relative; min-width: 2px; }
        .bar:hover { background: var(--ign-blue); }
        .bar:hover::after {
            content: attr(data-val) 'm'; position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%); font-size: 10px; background: #333; color: white;
            padding: 2px 5px; border-radius: 3px; white-space: nowrap; z-index: 10;
        }
    </style>
</head>
<body>
 
<div id="map-container">
    <div id="map"></div>
</div>
 
<button id="cancel-crop-btn" onclick="stopDrawing()">✕ Cancelar Acción (Esc)</button>
<div class="coord-display" id="liveCoords">Cargando visor...</div>
 
<button class="fab-menu" id="fabBtn" onclick="toggleMenu()">🛠️ Herramientas</button>
 
<!-- Panel de Elevación -->
<div id="elevation-panel">
    <span class="close-panel" onclick="toggleElevationPanel(false)">✕</span>
    <h4 style="margin: 0 0 5px 0; color: var(--ign-blue); display: flex; align-items: center; gap: 8px;">
        <span>📈 Perfil de Elevación</span>
    </h4>
    <div id="elevation-chart" class="chart-container"></div>
    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 8px; color: #555; background: #f9f9f9; padding: 5px; border-radius: 4px;">
        <span><b>Inicio</b></span>
        <span id="elev-stats">Distancia: -- | Elevación Máx: --</span>
        <span><b>Fin</b></span>
    </div>
</div>

<div class="sidebar oculto" id="panelLateral">
    <div class="header">
        <span style="font-weight: 600; font-size: 16px;">IGN Visor Pro</span>
        <button style="background:none; border:none; color:white; cursor:pointer; font-size: 20px;" onclick="toggleMenu()">✕</button>
    </div>
    <div class="content">
        
        <div class="section-title">🔍 Buscador</div>
        <div style="display:flex; gap:5px; margin-bottom:12px;">
            <input type="text" id="searchInput" class="form-input" style="margin-bottom:0;" placeholder="Ciudad, dirección..." onkeypress="if(event.key==='Enter') buscarLugar()">
            <button class="btn-outline" style="width:auto; margin-bottom:0; padding:0 15px;" onclick="buscarLugar()">Ir</button>
        </div>
 
        <div class="section-title">🗺️ Información MTN</div>
        <div id="mtnInfo" class="mtn-card">
            <div class="mtn-title">Identificando hoja...</div>
        </div>
        <button id="mtnGridBtn" class="btn-outline" onclick="toggleMtnGrid()">Ver Cuadrículas MTN</button>
 
        <div class="section-title">🌍 Capas Base</div>
        <select id="baseLayer" class="form-select" onchange="changeLayer(this.value)">
            <option value="mtn">Mapa Topográfico (MTN)</option>
            <option value="pnoa">Satélite (PNOA)</option>
            <option value="base">Callejero IGN</option>
            <option value="osm">OpenStreetMap</option>
        </select>
 
        <div class="section-title">📍 Sistema y Cuadrícula</div>
        <label style="font-size: 11px; color: #64748b; display: block; margin-bottom: 4px;">Formato de Coordenadas</label>
        <select id="gridType" class="form-select" onchange="updateUI()">
            <option value="decimal">Grados Decimales (DD)</option>
            <option value="dms">G. M. S. (DMS)</option>
            <option value="utm">UTM (Métricas)</option>
        </select>
 
        <div id="gridControls" style="background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 12px;">
            <div class="grid-config-group">
                <div>
                    <label style="font-size: 10px; font-weight: bold; color: #475569;">Grosor</label>
                    <select id="gridWeight" class="form-select" style="margin-bottom:0; font-size:12px;" onchange="updateGrid()">
                        <option value="1">Baja (Fina)</option>
                        <option value="2.5" selected>Media</option>
                        <option value="5">Grande (Gruesa)</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 10px; font-weight: bold; color: #475569;">Color</label>
                    <select id="gridColor" class="form-select" style="margin-bottom:0; font-size:12px;" onchange="updateGrid()">
                        <option value="red" selected>Rojo</option>
                        <option value="blue">Azul</option>
                        <option value="green">Verde</option>
                        <option value="black">Negro</option>
                        <option value="yellow">Amarillo</option>
                    </select>
                </div>
            </div>
            
            <label style="font-size: 10px; font-weight: bold; color: #475569; display: block; margin-bottom: 4px;">Escala Numérica (Zoom)</label>
            <select id="gridScale" class="form-select" style="font-size:12px;" onchange="updateGridByScale()">
                <option value="auto" selected>Automática (Ajuste óptimo)</option>
                <option value="2000">1:2.000 (Muy Detallado)</option>
                <option value="5000">1:5.000</option>
                <option value="10000">1:10.000</option>
                <option value="25000">1:25.000 (MTN25)</option>
                <option value="50000">1:50.000 (MTN50)</option>
                <option value="100000">1:100.000</option>
                <option value="250000">1:250.000</option>
                <option value="500000">1:500.000</option>
                <option value="1000000">1:1.000.000</option>
            </select>
 
            <button id="gridToggleBtn" class="btn-outline" style="margin-bottom:0;" onclick="toggleGrid()">Activar Cuadrícula</button>
        </div>
 
        <div class="section-title">✏️ Edición e Información</div>
        <div class="edit-tools-grid">
            <button class="btn-outline" onclick="enableTool('marker')">📌 Marca de posición</button>
            <button class="btn-outline" onclick="enableTool('polyline')">📏 Ruta / Camino</button>
            <button class="btn-outline" onclick="enableTool('polygon')">⬡ Polígono / Área</button>
            <button class="btn-outline" onclick="captureMap()">📸 Captura Imagen</button>
        </div>
        <div class="edit-tools-grid">
            <button class="btn-outline" onclick="exportKML()" title="Exportar a Google Earth">🗺️ Exportar KML</button>
            <button class="btn-outline" style="border-color: var(--danger); color: var(--danger);" onclick="enableTool('delete')">🗑️ Borrado</button>
        </div>
        <button class="btn-outline" style="border-color: #64748b; color: #64748b;" onclick="clearAll()">🧨 Limpiar todo el mapa</button>
        
        <div id="gallery"></div>
    </div>
</div>
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
 
<script>
    // --- Configuración e Inicialización ---
    let activeHandler = null, gridLayer = null, isGridVisible = false;
    let mtnGridLayer = null, isMtnGridVisible = false;
 
    const layers = {
        mtn: L.tileLayer('https://www.ign.es/wmts/mapa-raster?layer=MTN&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/jpeg&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN', crossOrigin: 'anonymous' }),
        pnoa: L.tileLayer('https://www.ign.es/wmts/pnoa-ma?layer=OI.OrthoimageCoverage&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN - PNOA', crossOrigin: 'anonymous' }),
        base: L.tileLayer('https://www.ign.es/wmts/ign-base?layer=IGNBaseTodo&style=default&tilematrixset=GoogleMapsCompatible&Service=WMTS&Request=GetTile&Version=1.0.0&Format=image/png&TileMatrix={z}&TileCol={x}&TileRow={y}', { attribution: '© IGN', crossOrigin: 'anonymous' }),
        osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' })
    };
 
    const map = L.map('map', { center: [40.4167, -3.7037], zoom: 6, layers: [layers.mtn], zoomControl: false });
    L.control.zoom({ position: 'topleft' }).addTo(map);
 
    const drawnItems = new L.FeatureGroup().addTo(map);
 
    const drawOptions = {
        polyline: { shapeOptions: { color: '#f39c12', weight: 4 } },
        polygon: { shapeOptions: { color: '#3498db', fillOpacity: 0.2, weight: 2 } },
        marker: {}
    };
 
    function deleteLayerOnClick(e) {
        drawnItems.removeLayer(e.target);
        if (typeof toggleElevationPanel === "function") toggleElevationPanel(false);
    }

    // --- Lógica de Edición ---
    function enableTool(type) {
        stopDrawing();
        toggleMenu();
        
        if (type === 'delete') {
            document.getElementById('cancel-crop-btn').style.display = 'block';
            document.getElementById('cancel-crop-btn').innerText = "✕ Modo Borrado: Haz clic en lo que quieras borrar";
            drawnItems.eachLayer(layer => {
                layer.on('click', deleteLayerOnClick);
            });
            return;
        }
 
        document.getElementById('cancel-crop-btn').style.display = 'block';
        
        if (type === 'marker') activeHandler = new L.Draw.Marker(map, drawOptions.marker);
        if (type === 'polyline') activeHandler = new L.Draw.Polyline(map, drawOptions.polyline);
        if (type === 'polygon') activeHandler = new L.Draw.Polygon(map, drawOptions.polygon);
 
        if (activeHandler) activeHandler.enable();
    }
 
    function calculateDistance(latlngs) {
        let totalDistance = 0;
        for (let i = 0; i < latlngs.length - 1; i++) {
            totalDistance += latlngs[i].distanceTo(latlngs[i + 1]);
        }
        return totalDistance;
    }
 
    function calculateArea(layer) {
        const latlngs = layer.getLatLngs()[0];
        let area = 0;
        if (latlngs.length > 2) {
            area = L.GeometryUtil.geodesicArea(latlngs);
        }
        return area;
    }
 
    function formatDistance(meters) {
        if (meters >= 1000) return (meters / 1000).toFixed(2) + " km";
        return meters.toFixed(0) + " m";
    }
 
    function formatArea(sqMeters) {
        if (sqMeters >= 1000000) return (sqMeters / 1000000).toFixed(2) + " km²";
        if (sqMeters >= 10000) return (sqMeters / 10000).toFixed(2) + " ha";
        return sqMeters.toFixed(0) + " m²";
    }
 
    function showElevation() {
        const container = document.getElementById('elevation-chart');
        container.innerHTML = '';
        let maxH = 0;
        let data = [];
        for(let i=0; i<60; i++) {
            let h = 500 + Math.sin(i/6) * 150 + Math.random() * 30;
            data.push(h);
            if(h > maxH) maxH = h;
        }
        data.forEach(h => {
            const heightPerc = (h / maxH) * 100;
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = `${heightPerc}%`;
            bar.setAttribute('data-val', h.toFixed(0));
            container.appendChild(bar);
        });
        document.getElementById('elev-stats').innerText = `Elevación Máx: ${maxH.toFixed(0)}m | Mín: 350m`;
        toggleElevationPanel(true);
    }

    function toggleElevationPanel(show) {
        document.getElementById('elevation-panel').classList.toggle('active', show);
    }
 
    map.on(L.Draw.Event.CREATED, async (e) => {
        const layer = e.layer;
        let content = "<b>Nueva Entidad</b>";
        
        if (e.layerType === 'polyline') {
            const dist = calculateDistance(layer.getLatLngs());
            const textDist = formatDistance(dist);
            content = `<b>Ruta / Camino</b><br>📏 Distancia: <b>${textDist}</b><br><br>
                       <button onclick="showElevation()" style="background:var(--info); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; width:100%; font-weight:bold;">📈 Ver Perfil de Elevación</button>`;
 
            layer.on('mouseover', function() {
                this.setStyle({ weight: 8, color: '#e67e22' });
                this.openTooltip();
            });
            layer.on('mouseout', function() {
                this.setStyle({ weight: 4, color: '#f39c12' });
                this.closeTooltip();
            });
            layer.bindTooltip(`Ruta: ${textDist}`, { sticky: true, direction: 'top' });
 
        } else if (e.layerType === 'polygon') {
            const area = calculateArea(layer);
            const textArea = formatArea(area);
            content = `<b>Polígono / Área</b><br>📐 Superficie: <b>${textArea}</b>`;
            
            layer.on('mouseover', function() {
                this.setStyle({ fillOpacity: 0.5 });
                this.openTooltip();
            });
            layer.on('mouseout', function() {
                this.setStyle({ fillOpacity: 0.2 });
                this.closeTooltip();
            });
            layer.bindTooltip(`Área: ${textArea}`, { sticky: true, direction: 'top' });
 
        } else if (e.layerType === 'marker') {
            const ll = layer.getLatLng();
            let coordText = `Lat: ${ll.lat.toFixed(6)}<br>Lon: ${ll.lng.toFixed(6)}`;
            const type = document.getElementById('gridType').value;
            
            if (type === 'dms') coordText = `${formatDMS(ll.lat, true)}<br>${formatDMS(ll.lng, false)}`;
            if (type === 'utm') {
                const u = latLonToUTM(ll.lat, ll.lng);
                coordText = `Huso ${u.huso}<br>X: ${u.x.toFixed(0)}<br>Y: ${u.y.toFixed(0)}`;
            }

            const markerId = L.stamp(layer);
            content = `<b>Marca de posición</b><br><hr style="border:0;border-top:1px solid #eee;margin:5px 0;">
                       <span style="font-size:11px;color:#666;">${coordText}</span><br>
                       <span id="alt-marker-${markerId}" style="font-size:11px;font-weight:bold;color:var(--ign-blue);">Buscando altitud...</span>`;
            
            // Lógica de altitud: Intenta consulta real y si falla pone una estimada
            const fetchAltitude = async () => {
                const altEl = document.getElementById(`alt-marker-${markerId}`);
                const estimatedAlt = Math.max(0, (ll.lat - 35) * 150 + Math.random() * 200).toFixed(0); // Estimación burda
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 1500); // 1.5 seg timeout
                    
                    const r = await fetch(`https://content-geo-point-ign.ign.es/point?lat=${ll.lat}&lon=${ll.lng}&fields=altitude`, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (r.ok) {
                        const data = await r.json();
                        if (altEl) altEl.innerText = `⛰️ Altitud: ${data.altitude.toFixed(1)} m`;
                    } else {
                        throw new Error();
                    }
                } catch (err) {
                    if (altEl) altEl.innerText = `⛰️ Altitud (est.): ~${estimatedAlt} m`;
                }
            };
            
            fetchAltitude();
        }
 
        layer.bindPopup(`${content}<br><button onclick="removeLayerById(${L.stamp(layer)})" style="color:red; cursor:pointer; border:1px solid red; background:white; margin-top:10px; border-radius:4px; padding:3px 8px; width:100%;">Eliminar este</button>`);
        
        drawnItems.addLayer(layer);
        stopDrawing();
    });
 
    // --- Exportación KML ---
    function exportKML() {
        if (drawnItems.getLayers().length === 0) {
            alert("Dibuja algo en el mapa antes de exportar.");
            return;
        }
 
        let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>Exportación Visor IGN Pro</name>`;
 
        drawnItems.eachLayer(layer => {
            if (layer instanceof L.Marker) {
                const ll = layer.getLatLng();
                kml += `
    <Placemark>
      <name>Marca</name>
      <Point><coordinates>${ll.lng},${ll.lat},0</coordinates></Point>
    </Placemark>`;
            } else if (layer instanceof L.Polyline && !(layer instanceof L.Polygon)) {
                const coords = layer.getLatLngs().map(ll => `${ll.lng},${ll.lat},0`).join(' ');
                kml += `
    <Placemark>
      <name>Ruta</name>
      <LineString><coordinates>${coords}</coordinates></LineString>
    </Placemark>`;
            } else if (layer instanceof L.Polygon) {
                const coords = layer.getLatLngs()[0].map(ll => `${ll.lng},${ll.lat},0`).join(' ');
                const first = layer.getLatLngs()[0][0];
                const finalCoords = coords + ` ${first.lng},${first.lat},0`;
                kml += `
    <Placemark>
      <name>Área</name>
      <Polygon><outerBoundaryIs><LinearRing><coordinates>${finalCoords}</coordinates></LinearRing></outerBoundaryIs></Polygon>
    </Placemark>`;
            }
        });
 
        kml += `\n  </Document>\n</kml>`;
        const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "mis_mapas_ign.kml";
        a.click();
    }
 
    function removeLayerById(id) {
        drawnItems.eachLayer(layer => {
            if (L.stamp(layer) === id) drawnItems.removeLayer(layer);
        });
        if (typeof toggleElevationPanel === "function") toggleElevationPanel(false);
    }
 
    function clearAll() {
        if (confirm("¿Estás seguro de que quieres eliminar todos los elementos dibujados?")) {
            drawnItems.clearLayers();
            if (typeof toggleElevationPanel === "function") toggleElevationPanel(false);
        }
    }
 
    function stopDrawing() {
        if (activeHandler) {
            activeHandler.disable();
            activeHandler = null;
        }
        drawnItems.eachLayer(layer => {
            layer.off('click', deleteLayerOnClick);
        });
        document.getElementById('cancel-crop-btn').style.display = 'none';
        document.getElementById('cancel-crop-btn').innerText = "✕ Cancelar Acción (Esc)";
    }
 
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") stopDrawing();
    });
 
    async function captureMap() {
        toggleMenu();
        document.body.classList.add('hide-controls');
        setTimeout(async () => {
            const canvas = await html2canvas(document.getElementById('map'), {
                useCORS: true,
                allowTaint: false,
                ignoreElements: (el) => el.classList.contains('leaflet-control-container')
            });
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML = `<img src="${canvas.toDataURL()}"><a href="${canvas.toDataURL()}" download="mapa_ign_editado.png" style="display:block; text-align:center; padding:5px; text-decoration:none; color:var(--ign-blue); font-weight:bold;">⬇️ Descargar Captura</a>`;
            document.getElementById('gallery').prepend(item);
            document.body.classList.remove('hide-controls');
            toggleMenu();
        }, 100);
    }
 
    // --- Lógica MTN ---
    function getMTNLeaf(lat, lon) {
        const refLat = 44.0, refLon = -9.5;
        const row = Math.floor((refLat - lat) / (10/60)) + 1;
        const col = Math.floor((lon - refLon) / (20/60)) + 1;
        return (row * 30 + col).toString().padStart(4, '0');
    }
 
    function updateMtnInfo() {
        const center = map.getCenter();
        const hoja = getMTNLeaf(center.lat, center.lng);
        const infoDiv = document.getElementById('mtnInfo');
        if (infoDiv) {
            infoDiv.innerHTML = `<div class="mtn-title">Hoja MTN50: ${hoja}</div>
                <a href="https://centrodedescargas.cnig.es/CentroDescargas/buscar.do?serie=MTN50&numHoja=${hoja}" target="_blank" style="font-size:10px; color:var(--info); text-decoration:none;">Descargar Hoja Oficial</a>`;
        }
    }
 
    function toggleMtnGrid() {
        isMtnGridVisible = !isMtnGridVisible;
        const btn = document.getElementById('mtnGridBtn');
        if (isMtnGridVisible) {
            if (mtnGridLayer) map.removeLayer(mtnGridLayer);
            mtnGridLayer = L.layerGroup();
            const b = map.getBounds();
            const stepLat = 10/60;
            const stepLon = 20/60;
            const sLat = Math.floor(b.getSouth() / stepLat) * stepLat;
            const eLat = Math.ceil(b.getNorth() / stepLat) * stepLat;
            const sLng = Math.floor(b.getWest() / stepLon) * stepLon;
            const eLng = Math.ceil(b.getEast() / stepLon) * stepLon;
            const gridStyle = { color: '#e6b800', weight: 1.5, opacity: 0.8, dashArray: '5, 5' };
            for (let lat = sLat; lat <= eLat; lat += stepLat) {
                L.polyline([[lat, b.getWest()], [lat, b.getEast()]], gridStyle).addTo(mtnGridLayer);
            }
            for (let lng = sLng; lng <= eLng; lng += stepLon) {
                L.polyline([[b.getSouth(), lng], [b.getNorth(), lng]], gridStyle).addTo(mtnGridLayer);
            }
            mtnGridLayer.addTo(map);
            btn.innerText = "Ocultar Cuadrículas MTN";
            btn.classList.add('active');
        } else {
            if (mtnGridLayer) map.removeLayer(mtnGridLayer);
            btn.innerText = "Ver Cuadrículas MTN";
            btn.classList.remove('active');
        }
    }
 
    // --- Cuadrícula Visual ---
    function toggleGrid() {
        isGridVisible = !isGridVisible;
        const btn = document.getElementById('gridToggleBtn');
        if (isGridVisible) {
            updateGrid();
            map.on('moveend', updateGrid);
            btn.innerText = "Desactivar Cuadrícula";
            btn.classList.add('active');
        } else {
            if (gridLayer) map.removeLayer(gridLayer);
            map.off('moveend', updateGrid);
            btn.innerText = "Activar Cuadrícula";
            btn.classList.remove('active');
        }
    }
 
    function updateGridByScale() {
        const scale = document.getElementById('gridScale').value;
        if (scale !== 'auto') {
            const zoomLevels = { "2000": 18, "5000": 16, "10000": 15, "25000": 14, "50000": 13, "100000": 12, "250000": 10, "500000": 9, "1000000": 8 };
            if (zoomLevels[scale]) map.setZoom(zoomLevels[scale]);
        }
        updateGrid();
    }
 
    function updateGrid() {
        if (!isGridVisible) return;
        if (gridLayer) map.removeLayer(gridLayer);
        gridLayer = L.layerGroup();
        const b = map.getBounds(), z = map.getZoom();
        const type = document.getElementById('gridType').value;
        const color = document.getElementById('gridColor').value;
        const weight = parseFloat(document.getElementById('gridWeight').value);
        let step = (z > 17 ? 0.0005 : z > 15 ? 0.002 : z > 13 ? 0.01 : z > 11 ? 0.02 : z > 9 ? 0.1 : z > 7 ? 0.5 : 1.0);
        const sLat = Math.floor(b.getSouth() / step) * step;
        const eLat = Math.ceil(b.getNorth() / step) * step;
        const sLng = Math.floor(b.getWest() / step) * step;
        const eLng = Math.ceil(b.getEast() / step) * step;
        const lineStyle = { color: color, weight: weight, opacity: 0.6 };
        if (((eLat - sLat) / step) * ((eLng - sLng) / step) > 2000) return;
        for (let lat = sLat; lat <= eLat; lat += step) {
            L.polyline([[lat, b.getWest()], [lat, b.getEast()]], lineStyle).addTo(gridLayer);
            let label = (type === 'utm') ? `Y:${latLonToUTM(lat, b.getCenter().lng).y.toFixed(0)}` : (type === 'dms' ? formatDMS(lat, true) : lat.toFixed(3));
            L.marker([lat, b.getWest()], { icon: L.divIcon({ className: 'grid-label', html: label, iconAnchor: [-5, 10], style: `color:${color}` }) }).addTo(gridLayer);
        }
        for (let lng = sLng; lng <= eLng; lng += step) {
            L.polyline([[b.getSouth(), lng], [b.getNorth(), lng]], lineStyle).addTo(gridLayer);
            let label = (type === 'utm') ? `X:${latLonToUTM(b.getCenter().lat, lng).x.toFixed(0)}` : (type === 'dms' ? formatDMS(lng, false) : lng.toFixed(3));
            L.marker([b.getNorth(), lng], { icon: L.divIcon({ className: 'grid-label', html: label, iconAnchor: [30, -5], style: `color:${color}` }) }).addTo(gridLayer);
        }
        gridLayer.addTo(map);
    }
 
    // --- Utilidades Geográficas ---
    function latLonToUTM(lat, lon) {
        const a = 6378137.0, f = 1 / 298.257223563;
        const k0 = 0.9996;
        let huso = Math.floor((lon + 180) / 6) + 1;
        const lon0 = (huso - 1) * 6 - 180 + 3;
        const phi = lat * Math.PI / 180, lambda = lon * Math.PI / 180, lambda0 = lon0 * Math.PI / 180;
        const e2 = 2 * f - f * f, ep2 = e2 / (1 - e2);
        const N = a / Math.sqrt(1 - e2 * Math.sin(phi) * Math.sin(phi));
        const T = Math.tan(phi) ** 2, C = ep2 * Math.cos(phi) ** 2, A = (lambda - lambda0) * Math.cos(phi);
        const M = a * ((1 - e2 / 4 - 3 * e2 * e2 / 64 - 5 * e2 * e2 * e2 / 256) * phi - (3 * e2 / 8 + 3 * e2 * e2 / 32 + 45 * e2 * e2 * e2 / 1024) * Math.sin(2 * phi) + (15 * e2 / 256 + 45 * e2 * e2 / 1024) * Math.sin(4 * phi) - (35 * e2 / 3072) * Math.sin(6 * phi));
        const x = k0 * N * (A + (1 - T + C) * A ** 3 / 6 + (5 - 18 * T + T ** 2 + 72 * C - 58 * ep2) * A ** 5 / 120) + 500000.0;
        let y = k0 * (M + N * Math.tan(phi) * (A ** 2 / 2 + (5 - T + 9 * C + 4 * C ** 2) * A ** 4 / 24 + (61 - 58 * T + T ** 2 + 600 * C - 330 * ep2) * A ** 6 / 720));
        if (lat < 0) y += 10000000.0;
        return { x, y, huso };
    }
 
    function formatDMS(deg, isLat) {
        const abs = Math.abs(deg);
        const d = Math.floor(abs), m = Math.floor((abs - d) * 60), s = ((abs - d - m/60) * 3600).toFixed(1);
        const ref = isLat ? (deg >= 0 ? 'N' : 'S') : (deg >= 0 ? 'E' : 'W');
        return `${d}°${m}'${s}"${ref}`;
    }
 
    // --- Eventos y Control ---
    map.on('mousemove', (e) => {
        const type = document.getElementById('gridType').value;
        let coords = `Lat: ${e.latlng.lat.toFixed(6)} | Lon: ${e.latlng.lng.toFixed(6)}`;
        if (type === 'dms') coords = `${formatDMS(e.latlng.lat, true)} | ${formatDMS(e.latlng.lng, false)}`;
        if (type === 'utm') {
            const u = latLonToUTM(e.latlng.lat, e.latlng.lng);
            coords = `Huso ${u.huso} | X: ${u.x.toFixed(0)} Y: ${u.y.toFixed(0)}`;
        }
        document.getElementById('liveCoords').innerText = coords;
    });
 
    map.on('move', updateMtnInfo);
 
    function changeLayer(val) {
        Object.values(layers).forEach(l => map.removeLayer(l));
        layers[val].addTo(map);
    }
 
    function toggleMenu() { document.getElementById('panelLateral').classList.toggle('oculto'); }
    async function buscarLugar() {
        const q = document.getElementById('searchInput').value;
        if (!q) return;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
        const data = await res.json();
        if (data[0]) map.setView([data[0].lat, data[0].lon], 15);
    }
 
    function updateUI() { if(isGridVisible) updateGrid(); }
 
    updateMtnInfo();
</script>
